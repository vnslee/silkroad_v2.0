    <style>
        body { font-family: 'Hanken Grotesk', sans-serif; }
        .backdrop-blur-md { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .card-shadow { box-shadow: 0 4px 8px rgba(0, 32, 78, 0.12); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-button.active {
            background-color: #00204e;
            color: white;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
        /* 접근성: 키보드 포커스 가시화(제거 금지) */
        :focus-visible { outline: 2px solid #005db7; outline-offset: 2px; border-radius: 2px; }
        /* 스크린리더 전용(차트 표 대체본 등) — 시각적으로 숨기되 SR에는 노출 */
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
                   overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
        /* 모션 민감 사용자 존중 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .001ms !important;
                animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
        }
        @media print {
            .no-print { display: none !important; }
            .tab-content { display: block !important; }
        }
    </style>

<body class="bg-surface min-h-screen font-body-md text-text-primary antialiased">
<!-- 본문만 (chrome 헤더/플래그·타이틀·메타·PDF·메일 버튼은 프론트 React가 담당 — PIPELINE §5) -->
<div class="w-full flex flex-col relative bg-surface">
    <main class="flex-1 p-margin-desktop">
        <div class="max-w-7xl mx-auto">
            {{TAB_NAV}}

            {{TAB_PANELS}}
        </div>
    </main>
</div>

<script>
    // Tab switching functionality
    document.querySelectorAll('.tab-button').forEach(button => {
        button.addEventListener('click', () => {
            const tabId = button.getAttribute('data-tab');

            // Hide all tab contents
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // Remove active class from all buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab content
            document.getElementById(tabId).classList.add('active');

            // Add active class to clicked button
            button.classList.add('active');
        });
    });

    // Set first tab as active
    document.querySelector('.tab-button').classList.add('active');
</script>
</body>
