<!DOCTYPE html><html class="light" lang="ko" style=""><head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>{{PAGE_TITLE}}</title>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "accent-red": "#E63946",
                        "surface-bright": "#fbf9f9",
                        "on-primary-fixed-variant": "#1c4489",
                        "tertiary-fixed": "#ffdad8",
                        "primary-fixed-dim": "#aec6ff",
                        "inverse-surface": "#303031",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#005db7",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#92001c",
                        "secondary-fixed": "#d6e3ff",
                        "tertiary": "#4d000a",
                        "inverse-primary": "#aec6ff",
                        "primary-container": "#003478",
                        "on-primary-container": "#7d9fe9",
                        "primary-fixed": "#d8e2ff",
                        "on-secondary-container": "#003268",
                        "surface-dim": "#dbdad9",
                        "surface-container-low": "#f5f3f3",
                        "surface-border": "#DCDCDC",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e3e2e2",
                        "surface-container": "#efeded",
                        "secondary-fixed-dim": "#a9c7ff",
                        "on-tertiary-fixed": "#410007",
                        "surface-variant": "#e3e2e2",
                        "on-tertiary-container": "#ff7576",
                        "inverse-on-surface": "#f2f0f0",
                        "outline": "#747782",
                        "surface-light": "#F8F9FA",
                        "text-secondary": "#555555",
                        "on-primary-fixed": "#001a43",
                        "surface-tint": "#395da2",
                        "on-secondary-fixed": "#001b3d",
                        "on-surface-variant": "#434751",
                        "on-secondary-fixed-variant": "#00468c",
                        "on-error-container": "#93000a",
                        "outline-variant": "#c4c6d2",
                        "text-disabled": "#BEBEBE",
                        "secondary-container": "#599bfe",
                        "tertiary-fixed-dim": "#ffb3b1",
                        "on-secondary": "#ffffff",
                        "background": "#fbf9f9",
                        "error-container": "#ffdad6",
                        "surface": "#fbf9f9",
                        "on-background": "#1b1c1c",
                        "text-primary": "#000000",
                        "surface-container-high": "#e9e8e7",
                        "primary": "#00204e",
                        "tertiary-container": "#750015",
                        "on-surface": "#1b1c1c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "margin-desktop": "48px",
                        "gutter": "24px",
                        "base": "4px",
                        "margin-mobile": "16px",
                        "xl": "32px",
                        "lg": "24px",
                        "xs": "4px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "headline-md": ["Hanken Grotesk"],
                        "label-md": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "body-sm": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "label-sm": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        .custom-shadow-level-3 {
            box-shadow: 0 12px 24px -4px rgba(0, 32, 78, 0.16);
        }
        .custom-shadow-level-2 {
            box-shadow: 0 4px 8px -2px rgba(0, 32, 78, 0.12);
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c4c6d2; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #747782; }

        /* 접근성: 키보드 포커스 가시화(제거 금지) */
        :focus-visible { outline: 2px solid #005db7; outline-offset: 2px; border-radius: 2px; }
        /* 스크린리더 전용(차트 표 대체본 등) */
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
                   overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
        /* 모션 민감 사용자 존중 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .001ms !important;
                animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
        }
    </style>
</head>
<body class="bg-surface font-body-md text-body-md text-on-surface antialiased">
<!-- 본문만 (chrome 헤더/닫기/시뮬레이션/보고서 버튼·푸터는 프론트 React가 담당 — PIPELINE §5) -->
<main class="p-lg">
    <div class="w-full max-w-5xl mx-auto flex flex-col gap-xl">
        <!-- KPI Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-md">
            {{KPI_CARDS}}
        </div>
        <!-- Entered countries -->
        {{ENTERED_LIST}}
        <!-- Quick-win ranking -->
        {{QUICKWIN_TABLE}}
        <!-- Region performance charts -->
        {{PERF_CHART}}
    </div>
</main>
</body></html>
