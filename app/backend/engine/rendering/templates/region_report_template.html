<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>{{PAGE_TITLE}}</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            colors: {
                "accent-red": "#E63946",
                "surface-bright": "#fbf9f9",
                "inverse-surface": "#303031",
                "surface-container-lowest": "#ffffff",
                "secondary": "#005db7",
                "on-primary": "#ffffff",
                "error": "#ba1a1a",
                "primary-container": "#003478",
                "on-primary-container": "#7d9fe9",
                "surface-dim": "#dbdad9",
                "surface-container-low": "#f5f3f3",
                "surface-border": "#DCDCDC",
                "surface-container-highest": "#e3e2e2",
                "surface-container": "#efeded",
                "surface-variant": "#e3e2e2",
                "inverse-on-surface": "#f2f0f0",
                "outline": "#747782",
                "surface-light": "#F8F9FA",
                "text-secondary": "#555555",
                "surface-tint": "#395da2",
                "on-surface-variant": "#434751",
                "outline-variant": "#c4c6d2",
                "text-disabled": "#BEBEBE",
                "secondary-container": "#599bfe",
                "on-secondary": "#ffffff",
                "background": "#fbf9f9",
                "surface": "#fbf9f9",
                "on-background": "#1b1c1c",
                "text-primary": "#000000",
                "surface-container-high": "#e9e8e7",
                "primary": "#00204e",
                "on-surface": "#1b1c1c"
            },
            borderRadius: {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            spacing: {
                "sm": "8px",
                "gutter": "24px",
                "base": "4px",
                "xl": "32px",
                "lg": "24px",
                "xs": "4px",
                "md": "16px"
            },
            fontFamily: {
                "headline-md": ["Hanken Grotesk"],
                "label-md": ["Hanken Grotesk"],
                "headline-lg": ["Hanken Grotesk"],
                "body-sm": ["Hanken Grotesk"],
                "label-sm": ["Hanken Grotesk"],
                "body-lg": ["Hanken Grotesk"],
                "body-md": ["Hanken Grotesk"]
            },
            fontSize: {
                "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}],
                "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
        }
    }
}
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
    .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .modal-backdrop { background-color: rgba(0, 32, 78, 0.4); backdrop-filter: blur(8px); }
    /* 접근성: 키보드 포커스 가시화(제거 금지) */
    :focus-visible { outline: 2px solid #005db7; outline-offset: 2px; border-radius: 2px; }
    /* 스크린리더 전용(차트 표 대체본 등) — 시각적으로 숨기되 SR에는 노출 */
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
               overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    /* 모션 민감 사용자 존중 */
    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: .001ms !important;
            animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
    }
    @media print {
        .no-print { display: none !important; }
        .tab-panel { display: flex !important; }
        nav { display: none !important; }
        .modal-backdrop { background: #fff; backdrop-filter: none; }
        .fixed { position: static; }
    }
</style>
</head>
<body class="bg-surface text-on-background font-body-md min-h-screen">
<!-- 본문만 (chrome 헤더/타이틀·메타·PDF·메일 버튼·푸터는 프론트 React가 담당 — PIPELINE §5) -->
<div class="w-full flex flex-col bg-surface">
    <!-- 탭 네비게이션 -->
    <nav class="border-b border-surface-border px-lg flex gap-xl overflow-x-auto no-scrollbar"
         role="tablist" aria-label="보고서 섹션">
        {{TAB_NAV}}
    </nav>

    <!-- 콘텐츠 영역 -->
    <div class="p-lg bg-surface flex flex-col gap-xl">
        {{TAB_PANELS}}
    </div>
</div>

<script>
function showTab(key) {
    document.querySelectorAll('.tab-panel').forEach(p => {
        const on = p.dataset.panel === key;
        p.classList.toggle('hidden', !on);
        p.classList.toggle('flex', on);
        p.hidden = !on;
    });
    document.querySelectorAll('.tab-btn').forEach(b => {
        const on = b.dataset.tab === key;
        b.classList.toggle('text-primary', on);
        b.classList.toggle('border-primary', on);
        b.classList.toggle('text-on-surface-variant', !on);
        b.classList.toggle('border-transparent', !on);
        b.setAttribute('aria-selected', on ? 'true' : 'false');
        b.tabIndex = on ? 0 : -1;
    });
}
// 탭 키보드 내비게이션(좌우/Home/End) — WAI-ARIA tabs 패턴
document.addEventListener('keydown', (e) => {
    const btns = [...document.querySelectorAll('.tab-btn')];
    const i = btns.indexOf(document.activeElement);
    if (i < 0) return;
    let n = null;
    if (e.key === 'ArrowRight') n = (i + 1) % btns.length;
    else if (e.key === 'ArrowLeft') n = (i - 1 + btns.length) % btns.length;
    else if (e.key === 'Home') n = 0;
    else if (e.key === 'End') n = btns.length - 1;
    if (n === null) return;
    e.preventDefault();
    btns[n].focus();
    showTab(btns[n].dataset.tab);
});
</script>
</body>
</html>
