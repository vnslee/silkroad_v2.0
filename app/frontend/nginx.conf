# frontend nginx — 정적 dist 서빙 + /api 프록시(같은 task 내 backend, awsvpc=localhost:8000).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅(해시 라우팅이지만 정적 자산 fallback 안전망)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 프록시 — ECS awsvpc 모드에서 같은 task의 컨테이너는 localhost로 통신.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;  # 리서치/보고서 잡 폴링 대비
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
