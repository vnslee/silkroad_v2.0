# frontend nginx — 정적 dist 서빙 + /api 프록시(같은 task 내 backend, awsvpc=localhost:8000).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 루트 접속은 앱 진입 경로(/app/)로 보낸다.
    location = / {
        return 302 /app/;
    }

    # 프론트 SPA — vite base=/app/ 와 동일 prefix에서 서빙. 자산은 /app/assets/* 에 실재한다.
    # (fallback도 /app/index.html 로 둬야 SPA 라우팅이 동작)
    location /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    # API 프록시 — ECS awsvpc 모드에서 같은 task의 컨테이너는 localhost로 통신.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;  # 리서치/보고서 잡 폴링 대비
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
