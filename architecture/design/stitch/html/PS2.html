    <style>
        .backdrop-blur-md {
            backdrop-filter: blur(12px);
        }
    </style>

<body class="bg-background font-body-md text-on-surface antialiased h-screen w-full flex items-center justify-center overflow-hidden">
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-primary/40 backdrop-blur-md flex items-center justify-center z-50 p-4 md:p-margin-desktop">
    <!-- Modal Container -->
    <div class="bg-surface rounded-[12px] shadow-[0_12px_24px_rgba(0,32,78,0.16)] w-full max-w-2xl flex flex-col overflow-hidden max-h-[921px]">
        <!-- Header -->
        <div class="flex items-start justify-between p-lg border-b border-surface-border">
            <div>
                <h2 class="font-headline-md text-headline-md text-primary mb-xs">Diagnostic Progress</h2>
                <p class="font-body-sm text-body-sm text-on-surface-variant">Generating your customized report</p>
            </div>
            <button class="text-outline hover:text-primary transition-colors p-sm rounded-lg hover:bg-surface-variant">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
            </button>
        </div>
        <!-- Scrollable Content -->
        <div class="p-lg overflow-y-auto flex-1 flex flex-col gap-xl">
            <!-- Total Progress Summary -->
            <div class="flex flex-col gap-sm">
                <div class="flex justify-between items-center mb-xs">
                    <span class="font-headline-md text-primary">Total Progress</span>
                    <span class="font-headline-md text-primary">75%</span>
                </div>
                <div class="w-full bg-surface-variant rounded-full h-4 overflow-hidden">
                    <div class="bg-primary-container h-4 rounded-full transition-all duration-500" style="width: 75%"></div>
                </div>
            </div>
            <div class="h-px bg-surface-border w-full"></div>
            <!-- Individual Progress Sections -->
            <div class="flex flex-col gap-lg">
                <!-- Market -->
                <div class="flex flex-col gap-xs">
                    <div class="flex justify-between items-center">
                        <span class="font-body-md text-on-surface font-medium">Market (시장)</span>
                        <span class="font-label-sm text-on-surface-variant px-sm py-xs bg-surface-variant rounded-full">Completed</span>
                    </div>
                    <div class="flex items-center gap-md">
                        <div class="flex-1 bg-surface-variant rounded-full h-2 overflow-hidden">
                            <div class="bg-primary-container h-2 rounded-full" style="width: 100%"></div>
                        </div>
                        <span class="font-body-sm text-primary-container font-semibold w-10 text-right">100%</span>
                    </div>
                </div>
                <!-- Regulation -->
                <div class="flex flex-col gap-xs">
                    <div class="flex justify-between items-center">
                        <span class="font-body-md text-on-surface font-medium">Regulation (규제)</span>
                        <span class="font-label-sm text-on-surface-variant px-sm py-xs bg-surface-variant rounded-full">Completed</span>
                    </div>
                    <div class="flex items-center gap-md">
                        <div class="flex-1 bg-surface-variant rounded-full h-2 overflow-hidden">
                            <div class="bg-primary-container h-2 rounded-full" style="width: 100%"></div>
                        </div>
                        <span class="font-body-sm text-primary-container font-semibold w-10 text-right">100%</span>
                    </div>
                </div>
                <!-- Product -->
                <div class="flex flex-col gap-xs">
                    <div class="flex justify-between items-center">
                        <span class="font-body-md text-on-surface font-medium">Product (상품)</span>
                        <span class="font-label-sm text-primary px-sm py-xs bg-primary/10 rounded-full animate-pulse">Analyzing...</span>
                    </div>
                    <div class="flex items-center gap-md">
                        <div class="flex-1 bg-surface-variant rounded-full h-2 overflow-hidden">
                            <div class="bg-primary-container h-2 rounded-full" style="width: 60%"></div>
                        </div>
                        <span class="font-body-sm text-primary-container font-semibold w-10 text-right">60%</span>
                    </div>
                </div>
                <!-- System -->
                <div class="flex flex-col gap-xs">
                    <div class="flex justify-between items-center">
                        <span class="font-body-md text-on-surface font-medium">System (시스템)</span>
                        <span class="font-label-sm text-on-surface-variant px-sm py-xs bg-surface-variant rounded-full">Pending</span>
                    </div>
                    <div class="flex items-center gap-md">
                        <div class="flex-1 bg-surface-variant rounded-full h-2 overflow-hidden">
                            <div class="bg-primary-container h-2 rounded-full" style="width: 0%"></div>
                        </div>
                        <span class="font-body-sm text-primary-container font-semibold w-10 text-right">0%</span>
                    </div>
                </div>
            </div>
        </div>
        <!-- Footer -->
        <div class="p-lg border-t border-surface-border bg-surface-light flex items-center justify-end gap-md">
            <button class="px-lg py-sm font-label-md text-label-md text-primary bg-transparent hover:bg-surface-variant rounded-lg transition-colors">
                Cancel
            </button>
            <button class="px-lg py-sm font-label-md text-label-md text-on-surface-variant bg-surface-variant rounded-lg shadow-sm cursor-not-allowed flex items-center gap-sm" disabled="">
                View Report (보고서 보기)
                <span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">lock</span>
            </button>
        </div>
    </div>
</div>
</body></html>
